document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    const templateData = JSON.parse(templateEl.textContent);
    const pages = templateData.pages;
    const entryId = templateData.entry;
    const pageIds = Object.keys(pages);

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : {};

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    // Per-page prep: substitute UUIDs, strip SRI/crossorigin (blob URLs from a
    // file:// document inherit a null origin, so crossorigin forces a CORS
    // fetch that SRI then rejects — the manifest bytes are ours; SRI protects
    // against CDN compromise, not this), and inject the page's own
    // window.__resources + the click interceptor into <head>. slice() rather
    // than replace() keeps us clear of $-pattern substitution.
    function resourcesFor(id) {
      var map = {};
      var list = extResources[id] || [];
      for (var k = 0; k < list.length; k++) {
        if (blobUrls[list[k].uuid]) map[list[k].id] = blobUrls[list[k].uuid];
      }
      return map;
    }
    for (const id of pageIds) {
      let t = pages[id];
      for (const uuid of uuids) t = t.split(uuid).join(blobUrls[uuid]);
      t = t.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');
      // The click interceptor owns every anchor click (not a <base target>):
      // a blanket <base target="_parent"> would also redirect form submissions
      // and tear down the wrapper. Non-# links navigate the parent to the
      // anchor's resolved href; #/… routes forward to the parent's hash only
      // when the id is one of this bundle's own pages (author #/… links from
      // an in-page hash router are left to the scroll path so they don't yank
      // the user to the entry page); plain #frag scrolls in place.
      // composedPath + getAttribute('target') handle SVG <a> and shadow-DOM
      // anchors, which closest()/IDL .target get wrong.
      var headContent = 'window.__resources = ' + JSON.stringify(resourcesFor(id)) + ';' +
        (pageIds.length > 1 ?
          'window.__bundler_pages = ' + JSON.stringify(pageIds) + ';' +
          'document.addEventListener("click", function(e){' +
            'if (e.button !== 0 || e.metaKey || e.ctrlKey || e.shiftKey || e.altKey || e.defaultPrevented) return;' +
            'var a = null, p = e.composedPath ? e.composedPath() : [e.target];' +
            'for (var j = 0; j < p.length && !a; j++) {' +
              'var n = p[j], tn = n && n.tagName;' +
              'if (tn === "A" || tn === "a" || tn === "AREA") a = n;' +
            '}' +
            'if (!a && e.target.closest) a = e.target.closest("a, area");' +
            'if (!a || a.hasAttribute("download")) return;' +
            'var tg = a.getAttribute("target");' +
            'if (tg && tg !== "_self") return;' +
            'var h = a.getAttribute("href") || a.getAttribute("xlink:href");' +
            'if (!h || /^javascript:/i.test(h)) return;' +
            'if (h.charAt(0) !== "#") {' +
              'if (!tg) { var b = document.querySelector("base[target]"); if (b && b.getAttribute("target") !== "_self") return; }' +
              'e.preventDefault();' +
              'if (/^(?:[a-z][a-z0-9+.-]*:|\\/\\/)/i.test(h)) parent.location.assign(h);' +
              'return;' +
            '}' +
            'e.preventDefault();' +
            'if (h.slice(0, 2) === "#/") {' +
              'var c = h.indexOf(":", 2);' +
              'var pid = c < 0 ? h.slice(2) : h.slice(2, c);' +
              'try { pid = decodeURIComponent(pid); } catch(err) {}' +
              'if (window.__bundler_pages.indexOf(pid) >= 0) { parent.location.hash = h; return; }' +
            '}' +
            'var t = h.length > 1 ? document.getElementById(h.slice(1)) : null;' +
            'if (t) t.scrollIntoView({behavior:"smooth"});' +
            'else scrollTo({top:0, behavior:"smooth"});' +
          '});' : '');
      // Defuse any script end-tag sequence in the content (resource ids, page
      // ids) before wrapping — same escape level as every sibling JSON island.
      var headScript = '<script>' +
        headContent.split('</' + 'script').join('<\\/' + 'script') +
        '</' + 'script>';
      // Inject after <head> so the DOCTYPE stays first; prepending the script
      // would push the parser into quirks mode. DOMParser always emits a <head>
      // (synthesizing one if the source HTML omitted it) but may carry
      // attributes through, so match the full opening tag.
      var headOpen = t.match(/<head[^>]*>/i);
      if (headOpen) {
        var hi = headOpen.index + headOpen[0].length;
        t = t.slice(0, hi) + headScript + t.slice(hi);
      }
      pages[id] = t;
    }

    setStatus('Rendering...');

    if (pageIds.length === 1) {
      // Single page: the pre-crawl render path. Parse the template and swap the
      // root element. Scripts inserted via DOMParser/replaceWith are inert per
      // spec — re-create each with createElement so they execute, awaiting
      // onload for src scripts to preserve ordering (React before ReactDOM
      // before Babel before text/babel).
      var template = pages[entryId];
      const doc = new DOMParser().parseFromString(template, 'text/html');
      document.documentElement.replaceWith(doc.documentElement);
      const dead = Array.from(document.scripts);
      for (const old of dead) {
        const s = document.createElement('script');
        for (const a of old.attributes) s.setAttribute(a.name, a.value);
        s.textContent = old.textContent;
        // text/babel scripts with a src: fetch and inline. transformScriptTags
        // does XHR against the src, but blob:null/ from a file:// origin is
        // silently dropped. Inlining makes it a plain inline babel script,
        // which transformScriptTags handles unconditionally.
        if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
          try {
            const r = await fetch(s.src);
            s.textContent = await r.text();
            s.removeAttribute('src');
          } catch (e) {}
        }
        // Non-executable script types (text/babel, application/json, …) are
        // data blocks per spec: the browser never fetches src and never fires
        // load/error, so awaiting would hang forever.
        const exec = !s.type || s.type === 'module' || /(java|ecma)script/i.test(s.type);
        const p = (s.src && exec) ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
        old.replaceWith(s);
        if (p) await p;
      }
      // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
      // which fired before we swapped the document. Trigger manually if present.
      if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
        window.Babel.transformScriptTags();
      }
      return;
    }

    // Multi-page: render into a full-viewport srcdoc iframe so each page runs
    // in its own realm while staying same-origin with the parent (so asset
    // blob URLs load and parent.location is writable).
    var frame = document.createElement('iframe');
    frame.id = '__bundler_frame';
    frame.setAttribute('style', 'position:fixed;inset:0;width:100%;height:100%;border:0;background:#fff');
    document.body.appendChild(frame);

    function decode(s) {
      try { return decodeURIComponent(s); } catch (e) { return s; }
    }
    function route() {
      var h = (location.hash || '');
      if (h.slice(0, 2) !== '#/') return { id: entryId, anchor: '' };
      h = h.slice(2);
      var i = h.indexOf(':');
      return i < 0 ? { id: decode(h), anchor: '' }
                   : { id: decode(h.slice(0, i)), anchor: decode(h.slice(i + 1)) };
    }

    var current = null;
    var navGen = 0;
    function navigate() {
      var r = route();
      var id = Object.prototype.hasOwnProperty.call(pages, r.id) ? r.id : entryId;
      if (current === id) {
        // Same-page anchor change: the iframe's own hash handles this, so
        // normally we don't reach here. If we do (e.g. a programmatic
        // parent.location.hash change), nudge the iframe.
        var cw = frame.contentWindow;
        if (!cw) return;
        var el = r.anchor && cw.document.getElementById(r.anchor);
        if (el) el.scrollIntoView({ behavior: 'smooth' });
        else cw.scrollTo({ top: 0, behavior: 'smooth' });
        return;
      }
      current = id;
      var gen = ++navGen;
      frame.onload = function() {
        // One-shot: an iframe-internal navigation (form submit, page JS
        // location.href=) re-fires onload with the same gen; after that the
        // iframe may be cross-origin, and cw.* access would throw.
        frame.onload = null;
        if (gen !== navGen) return;
        var cw = frame.contentWindow;
        try { cw.document.title && (document.title = cw.document.title); } catch (e) {}
        var splash = document.getElementById('__bundler_thumbnail') ||
                     document.getElementById('__bundler_placeholder');
        if (splash) splash.remove();
        if (loading) loading.remove();
        var el = r.anchor && cw.document.getElementById(r.anchor);
        if (el) el.scrollIntoView();
        else cw.scrollTo(0, 0);
      };
      frame.srcdoc = pages[id];
    }

    window.addEventListener('hashchange', navigate);
    navigate();
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

\n          <\u002Fsvg>\n          <div style=\"display:flex;justify-content:space-between;align-items:center;margin-top:7px;font-family:'Space Mono',monospace;font-size:10px;color:#6f86a0\">\n            <span>1 M°C<\u002Fspan>\n            <span style=\"color:#8cff9b\">· · Q = 1<\u002Fspan>\n            <span>250 M°C<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- PARAMETERS -->\n        <div style=\"display:flex;align-items:center;gap:10px;margin:24px 2px 12px\">\n          <span style=\"font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.16em;color:#7f95ad\">PARAMETRI<\u002Fspan>\n          <span style=\"flex:1;height:1px;background:linear-gradient(90deg,rgba(120,232,255,.18),rgba(120,232,255,0))\"><\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:8px;margin-bottom:12px\">\n          <sc-for list=\"{{ fuels }}\" as=\"f\" hint-placeholder-count=\"2\">\n            <button onclick=\"{{ f.onTap }}\" style=\"flex:1;cursor:pointer;border:1px solid rgba(120,232,255,.16);border-radius:12px;padding:11px 13px;background:{{ f.bg }};color:{{ f.fg }};text-align:left;transition:background .15s,color .15s\">\n              <div style=\"font-size:15px;font-weight:700;font-family:'Space Mono',monospace;line-height:1\">{{ f.label }}<\u002Fdiv>\n              <div style=\"font-size:10.5px;margin-top:4px;opacity:.82\">{{ f.sub }}<\u002Fdiv>\n            <\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:10px\">\n          <sc-for list=\"{{ sliders }}\" as=\"s\" hint-placeholder-count=\"5\">\n            <div style=\"background:rgba(13,26,43,.6);border:1px solid rgba(120,232,255,.1);border-radius:16px;padding:14px 15px 16px\">\n              <div style=\"display:flex;align-items:flex-start;justify-content:space-between;gap:12px\">\n                <div style=\"min-width:0\">\n                  <div style=\"font-size:15px;font-weight:600;color:#eaf4fb;line-height:1.15\">{{ s.name }}<\u002Fdiv>\n                  <div style=\"font-size:11.5px;color:#7f95ad;font-family:'Space Mono',monospace;margin-top:3px\">{{ s.sub }}<\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"font-family:'Space Mono',monospace;font-weight:700;font-size:18px;color:#dff3fb;background:#070f1b;border:1px solid rgba(120,232,255,.14);border-radius:10px;padding:6px 11px;min-width:54px;text-align:center;flex-shrink:0\">{{ s.val }}<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"position:relative;height:34px;margin-top:10px;display:flex;align-items:center\">\n                <div style=\"position:absolute;left:0;right:0;height:6px;border-radius:99px;background:#102032\"><\u002Fdiv>\n                <div style=\"position:absolute;left:0;height:6px;border-radius:99px;width:{{ s.pct }}%;background:{{ s.fill }};box-shadow:0 0 10px {{ s.fill }}\"><\u002Fdiv>\n                <div style=\"position:absolute;left:{{ s.pct }}%;top:50%;transform:translate(-50%,-50%);width:20px;height:20px;border-radius:50%;background:#eafcff;box-shadow:0 0 0 3px rgba(7,15,27,.9),0 0 12px {{ s.fill }};pointer-events:none\"><\u002Fdiv>\n                <input type=\"range\" min=\"{{ s.min }}\" max=\"{{ s.max }}\" value=\"{{ s.val }}\" step=\"1\" onchange=\"{{ s.onInput }}\" oninput=\"{{ s.onInput }}\" style=\"position:absolute;left:0;right:0;top:0;bottom:0;width:100%;height:100%;margin:0;opacity:0;cursor:pointer\">\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n\n        <!-- PRESETS -->\n        <div style=\"display:flex;align-items:center;gap:10px;margin:24px 2px 12px\">\n          <span style=\"font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.16em;color:#7f95ad\">SCENARI<\u002Fspan>\n          <span style=\"flex:1;height:1px;background:linear-gradient(90deg,rgba(120,232,255,.18),rgba(120,232,255,0))\"><\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:10px\">\n          <sc-for list=\"{{ presets }}\" as=\"p\" hint-placeholder-count=\"4\">\n            <button onclick=\"{{ p.onTap }}\" style=\"text-align:left;background:rgba(13,26,43,.6);border:1px solid rgba(120,232,255,.12);border-radius:14px;padding:13px 14px;cursor:pointer;color:#eaf4fb\" style-hover=\"background:rgba(120,232,255,.08);border-color:rgba(120,232,255,.3)\">\n              <div style=\"font-size:14px;font-weight:600;line-height:1.15\">{{ p.label }}<\u002Fdiv>\n              <div style=\"font-size:11px;color:#7f95ad;font-family:'Space Mono',monospace;margin-top:4px\">{{ p.sub }}<\u002Fdiv>\n            <\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- MANUAL SCREEN -->\n      <sc-if value=\"{{ isManual }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"padding:12px 18px 122px\">\n          <div style=\"margin:4px 2px 0\">\n            <div style=\"font-size:25px;font-weight:700;letter-spacing:-.02em;line-height:1.1\">Costruiscilo in piccolo<\u002Fdiv>\n            <p style=\"font-size:13.5px;color:#9fb2c9;line-height:1.55;margin:10px 0 0\">Una versione fisica e <b style=\"color:#eaf4fb\">depotenziata<\u002Fb> di FusionLab: una console‑gioco da tavolo che fa girare <i>questo stesso<\u002Fi> simulatore. Tutto a bassa tensione (USB&nbsp;5&nbsp;V) — è un modello, non un reattore.<\u002Fp>\n          <\u002Fdiv>\n\n          <div style=\"margin-top:16px;display:flex;gap:12px;background:rgba(255,209,102,.07);border:1px solid rgba(255,209,102,.26);border-radius:14px;padding:13px 14px\">\n            <div style=\"flex-shrink:0;width:22px;height:22px;border-radius:6px;background:rgba(255,209,102,.18);color:#ffd166;font-weight:800;font-size:14px;display:flex;align-items:center;justify-content:center\">!<\u002Fdiv>\n            <p style=\"margin:0;font-size:12.5px;line-height:1.5;color:#e7d9b6\">È un gioco/modello: <b>non esegue fusione<\u002Fb>. La fusione reale richiede condizioni estreme e impianti pericolosi (alta tensione, vuoto spinto, sorgenti di radiazione) che <b>non vanno costruiti<\u002Fb>. Qui si realizza solo l’elettronica del gioco.<\u002Fp>\n          <\u002Fdiv>\n\n          <div style=\"display:flex;align-items:center;gap:10px;margin:22px 2px 12px\">\n            <span style=\"font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.16em;color:#7f95ad\">SCHEMA<\u002Fspan>\n            <span style=\"flex:1;height:1px;background:linear-gradient(90deg,rgba(120,232,255,.18),rgba(120,232,255,0))\"><\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"display:flex;align-items:stretch;gap:8px;background:rgba(13,26,43,.6);border:1px solid rgba(120,232,255,.1);border-radius:16px;padding:16px 12px\">\n            <div style=\"flex:1;text-align:center;padding:11px 6px;border:1px solid rgba(120,232,255,.18);border-radius:10px;background:#0a1626\">\n              <div style=\"font-size:12px;font-weight:600;color:#eaf4fb\">5 slider<\u002Fdiv>\n              <div style=\"font-family:'Space Mono',monospace;font-size:9.5px;color:#7f95ad;margin-top:4px\">comandi<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display:flex;align-items:center;color:#75e8ff;font-size:17px\">→<\u002Fdiv>\n            <div style=\"flex:1.25;text-align:center;padding:11px 6px;border:1px solid rgba(120,232,255,.3);border-radius:10px;background:rgba(120,232,255,.06)\">\n              <div style=\"font-size:11.5px;font-weight:600;color:#eaf4fb\">micro‑controllore<\u002Fdiv>\n              <div style=\"font-family:'Space Mono',monospace;font-size:9.5px;color:#7f95ad;margin-top:4px\">USB 5V<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display:flex;align-items:center;color:#75e8ff;font-size:17px\">→<\u002Fdiv>\n            <div style=\"flex:1;text-align:center;padding:11px 6px;border:1px solid rgba(120,232,255,.18);border-radius:10px;background:#0a1626\">\n              <div style=\"font-size:12px;font-weight:600;color:#eaf4fb\">display + LED<\u002Fdiv>\n              <div style=\"font-family:'Space Mono',monospace;font-size:9.5px;color:#7f95ad;margin-top:4px\">plasma<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"display:flex;align-items:center;gap:10px;margin:22px 2px 12px\">\n            <span style=\"font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.16em;color:#7f95ad\">COSA SERVE<\u002Fspan>\n            <span style=\"flex:1;height:1px;background:linear-gradient(90deg,rgba(120,232,255,.18),rgba(120,232,255,0))\"><\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:10px\">\n            <sc-for list=\"{{ buildSteps }}\" as=\"b\" hint-placeholder-count=\"6\">\n              <div style=\"display:flex;gap:13px;background:rgba(13,26,43,.6);border:1px solid rgba(120,232,255,.1);border-radius:14px;padding:14px 15px\">\n                <div style=\"flex-shrink:0;font-family:'Space Mono',monospace;font-size:13px;font-weight:700;color:#75e8ff;width:22px\">{{ b.n }}<\u002Fdiv>\n                <div style=\"min-width:0\">\n                  <div style=\"font-size:14.5px;font-weight:600;color:#eaf4fb\">{{ b.t }}<\u002Fdiv>\n                  <p style=\"margin:5px 0 0;font-size:12.5px;line-height:1.5;color:#b6c8da\">{{ b.d }}<\u002Fp>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n\n          <div style=\"display:flex;align-items:center;gap:10px;margin:22px 2px 12px\">\n            <span style=\"font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.16em;color:#7f95ad\">DISTINTA MATERIALI<\u002Fspan>\n            <span style=\"flex:1;height:1px;background:linear-gradient(90deg,rgba(120,232,255,.18),rgba(120,232,255,0))\"><\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"background:rgba(13,26,43,.6);border:1px solid rgba(120,232,255,.1);border-radius:14px;overflow:hidden\">\n            <sc-for list=\"{{ bom }}\" as=\"b\" hint-placeholder-count=\"7\">\n              <div style=\"display:flex;align-items:center;gap:13px;padding:12px 15px;border-top:1px solid rgba(120,232,255,.07)\">\n                <div style=\"flex-shrink:0;min-width:38px;text-align:center;font-family:'Space Mono',monospace;font-size:13px;font-weight:700;color:#75e8ff\">{{ b.q }}<\u002Fdiv>\n                <div style=\"min-width:0;flex:1\">\n                  <div style=\"font-size:13.5px;font-weight:600;color:#eaf4fb;line-height:1.2\">{{ b.t }}<\u002Fdiv>\n                  <div style=\"font-size:11px;color:#7f95ad;font-family:'Space Mono',monospace;margin-top:2px\">{{ b.s }}<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n\n          <div style=\"display:flex;align-items:center;gap:10px;margin:22px 2px 12px\">\n            <span style=\"font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.16em;color:#7f95ad\">LA STESSA LOGICA<\u002Fspan>\n            <span style=\"flex:1;height:1px;background:linear-gradient(90deg,rgba(120,232,255,.18),rgba(120,232,255,0))\"><\u002Fspan>\n          <\u002Fdiv>\n          <pre style=\"margin:0;background:#070f1b;border:1px solid rgba(120,232,255,.12);border-radius:14px;padding:15px;overflow-x:auto;font-family:'Space Mono',monospace;font-size:11.5px;line-height:1.65;color:#bcd3e6;white-space:pre\">ogni ciclo:\n  leggi i 5 potenziometri\n  Q = lawson(T, D, τ, B, perdite) / 42\n  schermo.mostra(Lawson, Q, percento)\n  colore_LED = mappa(Q)   <span style=\"color:#6f86a0\">// blu → bianco<\u002Fspan>\n  se Q ≥ 1:\n    anima(\"ACCENSIONE\")<\u002Fpre>\n\n          <p style=\"margin:18px 2px 0;font-size:12px;color:#7f95ad;line-height:1.55\">Le formule sono quelle del simulatore: aprilo nella scheda <b style=\"color:#9fb2c9\">Simulatore<\u002Fb> per leggere i valori da replicare.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ABC SCREEN -->\n      <sc-if value=\"{{ isAbc }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"padding:12px 18px 122px\">\n          <div style=\"margin:4px 2px 0\">\n            <div style=\"font-size:25px;font-weight:700;letter-spacing:-.02em;line-height:1.1\">ABC della fusione<\u002Fdiv>\n            <p style=\"font-size:13.5px;color:#9fb2c9;line-height:1.55;margin:9px 0 0\">Capire, simulare e — in sicurezza — costruire.<\u002Fp>\n          <\u002Fdiv>\n\n          <div style=\"margin-top:16px;display:flex;gap:12px;background:rgba(255,209,102,.07);border:1px solid rgba(255,209,102,.26);border-radius:14px;padding:14px 15px\">\n            <div style=\"flex-shrink:0;width:22px;height:22px;border-radius:6px;background:rgba(255,209,102,.18);color:#ffd166;font-weight:800;font-size:14px;display:flex;align-items:center;justify-content:center\">!<\u002Fdiv>\n            <p style=\"margin:0;font-size:12.5px;line-height:1.55;color:#e7d9b6\">Un vero apparecchio di fusione “da casa” (il fusor di Farnsworth) usa alta tensione letale (decine di kV), alto vuoto e gas deuterio e, se davvero fonde, emette neutroni e raggi X. <b style=\"color:#ffe6a8\">Non posso darti le istruzioni passo‑passo per costruirlo<\u002Fb>: è pericoloso e si fa solo con competenze di sicurezza HV/radiazioni e supervisione (lab, dosimetri). Quello che posso darti è l’ABC per <b style=\"color:#ffe6a8\">capirlo<\u002Fb> e per <b style=\"color:#ffe6a8\">costruire/simulare in sicurezza<\u002Fb>.<\u002Fp>\n          <\u002Fdiv>\n\n          <!-- A -->\n          <div style=\"display:flex;align-items:center;gap:12px;margin:24px 2px 11px\">\n            <div style=\"flex-shrink:0;width:32px;height:32px;border-radius:9px;background:rgba(120,232,255,.12);border:1px solid rgba(120,232,255,.3);color:#bff4ff;font-weight:800;font-size:17px;display:flex;align-items:center;justify-content:center\">A<\u002Fdiv>\n            <div style=\"min-width:0\">\n              <div style=\"font-size:15.5px;font-weight:700;color:#eaf4fb;line-height:1.1\">Capire la fisica<\u002Fdiv>\n              <div style=\"font-family:'Space Mono',monospace;font-size:10.5px;color:#7f95ad;margin-top:3px\">i parametri del simulatore<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"background:rgba(13,26,43,.6);border:1px solid rgba(120,232,255,.1);border-radius:14px;padding:14px 15px\">\n            <p style=\"margin:0;font-size:13px;line-height:1.6;color:#c2d4e6\">Fondere nuclei leggeri richiede, insieme, <b style=\"color:#eaf4fb\">temperatura<\u002Fb> altissima, <b style=\"color:#eaf4fb\">densità<\u002Fb> e un <b style=\"color:#eaf4fb\">confinamento<\u002Fb> abbastanza lungo (criterio di Lawson). Quando <b style=\"color:#eaf4fb\">Q ≥ 1<\u002Fb> si raggiunge il break-even. È esattamente ciò che muovi nel Simulatore.<\u002Fp>\n          <\u002Fdiv>\n\n          <!-- B -->\n          <div style=\"display:flex;align-items:center;gap:12px;margin:22px 2px 11px\">\n            <div style=\"flex-shrink:0;width:32px;height:32px;border-radius:9px;background:rgba(120,232,255,.12);border:1px solid rgba(120,232,255,.3);color:#bff4ff;font-weight:800;font-size:17px;display:flex;align-items:center;justify-content:center\">B<\u002Fdiv>\n            <div style=\"min-width:0\">\n              <div style=\"font-size:15.5px;font-weight:700;color:#eaf4fb;line-height:1.1\">Come ci provano davvero<\u002Fdiv>\n              <div style=\"font-family:'Space Mono',monospace;font-size:10.5px;color:#7f95ad;margin-top:3px\">solo a livello concettuale<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"background:rgba(13,26,43,.6);border:1px solid rgba(120,232,255,.1);border-radius:14px;padding:14px 15px\">\n            <p style=\"margin:0;font-size:13px;line-height:1.6;color:#c2d4e6\">Confinamento <b style=\"color:#eaf4fb\">magnetico<\u002Fb> (tokamak, stellarator) e <b style=\"color:#eaf4fb\">inerziale<\u002Fb> (laser): grandi impianti di ricerca. Il fusor amatoriale esiste, ma è la parte pericolosa: serve capire <i>perché<\u002Fi> occorrono vuoto, alta tensione e schermatura — non <i>come<\u002Fi> realizzarli in garage.<\u002Fp>\n          <\u002Fdiv>\n\n          <!-- C -->\n          <div style=\"display:flex;align-items:center;gap:12px;margin:22px 2px 11px\">\n            <div style=\"flex-shrink:0;width:32px;height:32px;border-radius:9px;background:rgba(140,255,155,.12);border:1px solid rgba(140,255,155,.32);color:#9dffb0;font-weight:800;font-size:17px;display:flex;align-items:center;justify-content:center\">C<\u002Fdiv>\n            <div style=\"min-width:0\">\n              <div style=\"font-size:15.5px;font-weight:700;color:#eaf4fb;line-height:1.1\">Cosa puoi fare in sicurezza<\u002Fdiv>\n              <div style=\"font-family:'Space Mono',monospace;font-size:10.5px;color:#7f95ad;margin-top:3px\">subito, senza rischi<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:10px\">\n            <div style=\"display:flex;gap:13px;background:rgba(13,26,43,.6);border:1px solid rgba(120,232,255,.1);border-radius:14px;padding:14px 15px\">\n              <div style=\"flex-shrink:0;font-family:'Space Mono',monospace;font-size:13px;font-weight:700;color:#8cff9b;width:18px\">1<\u002Fdiv>\n              <div style=\"min-width:0\"><div style=\"font-size:14px;font-weight:600;color:#eaf4fb\">Il simulatore FusionLab<\u002Fdiv><p style=\"margin:4px 0 0;font-size:12.5px;line-height:1.5;color:#b6c8da\">muovi i parametri e capisci cosa serve per il break-even.<\u002Fp><\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display:flex;gap:13px;background:rgba(13,26,43,.6);border:1px solid rgba(120,232,255,.1);border-radius:14px;padding:14px 15px\">\n              <div style=\"flex-shrink:0;font-family:'Space Mono',monospace;font-size:13px;font-weight:700;color:#8cff9b;width:18px\">2<\u002Fdiv>\n              <div style=\"min-width:0\"><div style=\"font-size:14px;font-weight:600;color:#eaf4fb\">La console‑gioco depotenziata<\u002Fdiv><p style=\"margin:4px 0 0;font-size:12.5px;line-height:1.5;color:#b6c8da\">il modello del Manuale: 5&nbsp;V, LED, niente fusione.<\u002Fp><\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display:flex;gap:13px;background:rgba(13,26,43,.6);border:1px solid rgba(120,232,255,.1);border-radius:14px;padding:14px 15px\">\n              <div style=\"flex-shrink:0;font-family:'Space Mono',monospace;font-size:13px;font-weight:700;color:#8cff9b;width:18px\">3<\u002Fdiv>\n              <div style=\"min-width:0\"><div style=\"font-size:14px;font-weight:600;color:#eaf4fb\">Demo sicure di concetti collegati<\u002Fdiv><p style=\"margin:4px 0 0;font-size:12.5px;line-height:1.5;color:#b6c8da\">magneti, un globo al plasma commerciale, una pompa a vuoto manuale — per “sentire” densità e confinamento senza rischi.<\u002Fp><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <p style=\"margin:18px 2px 0;font-size:12px;color:#7f95ad;line-height:1.55\">Apri <b style=\"color:#9fb2c9\">Simulatore<\u002Fb> e <b style=\"color:#9fb2c9\">Manuale<\u002Fb> dalle schede qui sotto.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- TAB BAR -->\n      <div style=\"position:absolute;left:0;right:0;bottom:0;z-index:30;display:flex;justify-content:center;padding:12px 16px calc(env(safe-area-inset-bottom, 0px) + 16px);background:linear-gradient(0deg,#050b14 54%,rgba(5,11,20,.85) 82%,rgba(5,11,20,0))\">\n        <div style=\"display:flex;gap:4px;padding:4px;background:rgba(13,26,43,.9);border:1px solid rgba(120,232,255,.14);border-radius:999px;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)\">\n          <sc-for list=\"{{ tabs }}\" as=\"t\" hint-placeholder-count=\"2\">\n            <button onclick=\"{{ t.onTap }}\" style=\"border:none;cursor:pointer;padding:9px 16px;border-radius:999px;font-family:'Space Grotesk',sans-serif;font-size:13.5px;font-weight:600;white-space:nowrap;background:{{ t.bg }};color:{{ t.fg }};transition:background .15s,color .15s\">{{ t.label }}<\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- INFO SHEET -->\n      <sc-if value=\"{{ infoOpen }}\" hint-placeholder-val=\"{{ false }}\">\n        <div onclick=\"{{ closeInfo }}\" style=\"position:absolute;inset:0;z-index:38;background:rgba(4,9,16,.62);backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px)\"><\u002Fdiv>\n        <div style=\"position:absolute;left:0;right:0;bottom:0;z-index:39;background:#0a1626;border-top:1px solid rgba(120,232,255,.18);border-radius:26px 26px 0 0;padding:10px 20px 42px;box-shadow:0 -22px 60px rgba(0,0,0,.6);animation:fl-rise .28s ease\">\n          <div style=\"width:38px;height:4px;border-radius:99px;background:rgba(159,178,201,.4);margin:4px auto 16px\"><\u002Fdiv>\n          <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:16px\">\n            <div style=\"font-size:21px;font-weight:700;letter-spacing:-.02em\">Come funziona<\u002Fdiv>\n            <button onclick=\"{{ closeInfo }}\" style=\"width:32px;height:32px;border-radius:50%;border:1px solid rgba(120,232,255,.2);background:rgba(120,232,255,.06);color:#bfe9f5;font-size:17px;cursor:pointer;line-height:1\">×<\u002Fbutton>\n          <\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:12px\">\n            <div style=\"background:rgba(13,26,43,.6);border:1px solid rgba(120,232,255,.1);border-radius:14px;padding:14px 15px\">\n              <div style=\"font-family:'Space Mono',monospace;font-size:10.5px;letter-spacing:.14em;color:#75e8ff\">INDICE LAWSON &amp; Q<\u002Fdiv>\n              <p style=\"margin:8px 0 0;font-size:13.5px;line-height:1.55;color:#c2d4e6\">Densità, temperatura e tempo di confinamento insieme decidono se la fusione produce più energia di quanta ne consuma. Quando <b style=\"color:#eaf4fb\">Q ≥ 1<\u002Fb> si raggiunge il break-even didattico.<\u002Fp>\n            <\u002Fdiv>\n            <div style=\"background:rgba(13,26,43,.6);border:1px solid rgba(120,232,255,.1);border-radius:14px;padding:14px 15px\">\n              <div style=\"font-family:'Space Mono',monospace;font-size:10.5px;letter-spacing:.14em;color:#ffd166\">SOLO DIDATTICO<\u002Fdiv>\n              <p style=\"margin:8px 0 0;font-size:13.5px;line-height:1.55;color:#c2d4e6\">Temperatura elevata non significa energia netta: servono densità, confinamento e basse perdite allo stesso tempo. I valori sono in scala concettuale.<\u002Fp>\n            <\u002Fdiv>\n            <div style=\"background:rgba(13,26,43,.6);border:1px solid rgba(120,232,255,.1);border-radius:14px;padding:14px 15px\">\n              <div style=\"font-family:'Space Mono',monospace;font-size:10.5px;letter-spacing:.14em;color:#8cff9b\">SICUREZZA<\u002Fdiv>\n              <p style=\"margin:8px 0 0;font-size:13.5px;line-height:1.55;color:#c2d4e6\">Non contiene istruzioni per costruire hardware nucleare, alta tensione, vuoto o sorgenti di radiazione.<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- IGNITION PAYOFF -->\n      <sc-if value=\"{{ showIgnition }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"position:absolute;inset:0;z-index:42;display:flex;align-items:center;justify-content:center;padding:30px;background:radial-gradient(circle at 50% 42%,rgba(140,255,180,.2),rgba(4,9,16,.88) 62%);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);animation:fl-rise .3s ease\">\n          <div style=\"text-align:center;max-width:300px\">\n            <div style=\"font-family:'Space Mono',monospace;font-size:12px;letter-spacing:.32em;color:#8cff9b\">ACCENSIONE<\u002Fdiv>\n            <div style=\"font-size:29px;font-weight:700;letter-spacing:-.02em;margin-top:12px;line-height:1.12\">Break-even didattico superato<\u002Fdiv>\n            <p style=\"font-size:13.5px;color:#9fb2c9;line-height:1.55;margin:14px 0 0\">Con questi parametri il plasma rilascerebbe più energia di quanta ne assorbe (Q ≥ 1) — solo in via concettuale.<\u002Fp>\n            <button onclick=\"{{ ackIgnition }}\" style=\"margin-top:24px;width:100%;padding:14px;border-radius:14px;border:none;background:#8cff9b;color:#06140b;font-family:'Space Grotesk',sans-serif;font-size:15.5px;font-weight:700;cursor:pointer\">Continua a sperimentare<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:402,&quot;height&quot;:874},&quot;accent&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#75e8ff&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;glowIntensity&quot;:{&quot;editor&quot;:&quot;float&quot;,&quot;default&quot;:1,&quot;min&quot;:0.4,&quot;max&quot;:1.8,&quot;step&quot;:0.1,&quot;tsType&quot;:&quot;number&quot;},&quot;challenge&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;}}\">\nclass Component extends DCLogic {\n  state = { temp:11, dens:12, tau:8, loss:55, bfield:30, fuel:'DT', tab:'sim', history:[], infoOpen:false, ackIgnition:false };\n\n  setP(id, v){ this.setState({ [id]: Number(v) }); }\n  preset(obj){ this.setState(obj); }\n  setFuel(f){ this.setState({ fuel:f }); }\n  go(tab){ this.setState({ tab }); }\n  fmt(n, d){ return Number(n).toLocaleString('it-IT',{maximumFractionDigits:d, minimumFractionDigits:d}); }\n\n  physics(s){\n    const T=s.temp, D=s.dens, Ta=s.tau, L=s.loss, B=s.bfield;\n    const dt = s.fuel==='DT';\n    const fuelGain = dt ? 1 : 0.45;          // D-T molto piu reattivo del D-D\n    const fuelTopt = dt ? 250 : 360;         // il D-D richiede temperature piu alte\n    const effL = L * (1 - 0.4*(B/100));      // il campo magnetico migliora il confinamento\n    const lossPen=Math.pow(1-effL/100,1.8);\n    const lawson=Math.pow(T/100,1.55)*Math.pow(D/100,1.25)*Math.pow(Ta/100,1.35)*lossPen*fuelGain*100;\n    const reaction=Math.min(100, Math.pow(T/fuelTopt,1.8)*Math.pow(D/100,1.1)*fuelGain*100);\n    const q=Math.max(0, lawson/42);\n    const triple=(D/100)*(T/100)*(Ta/100)*100;\n    return { T,D,Ta,L,B, fuelGain, fuelTopt, effLpct:effL, lossPen, lawson, reaction, q, triple, effLoss:100-lossPen*100, progress:Math.min(100,q*100) };\n  }\n\n  qAtTemp(s, T){ return this.physics({ ...s, temp:T }).q; }\n\n  componentDidMount(){\n    this._hist = setInterval(()=>{\n      const q = this.physics(this.state).q;\n      this.setState(s=>({ history:[...s.history, q].slice(-48) }));\n    }, 900);\n  }\n  componentWillUnmount(){ clearInterval(this._hist); }\n\n  componentDidUpdate(){\n    if(this.state.ackIgnition && this.physics(this.state).q < 1){ this.setState({ ackIgnition:false }); }\n  }\n\n  renderVals(){\n    const S=this.state;\n    const accent = this.props.accent ?? '#75e8ff';\n    const glow = this.props.glowIntensity ?? 1;\n    const challenge = this.props.challenge ?? true;\n    const p = this.physics(S);\n\n    let status='Plasma freddo', tone='#9fb2c9';\n    if(p.q>=0.2){ status='Plasma interessante'; tone=accent; }\n    if(p.q>=0.6){ status='Quasi al break-even'; tone='#ffd166'; }\n    if(p.q>=1){ status='Accensione raggiunta'; tone='#8cff9b'; }\n\n    let regime='Sub-critico';\n    if(p.q>=0.3) regime='In riscaldamento';\n    if(p.q>=0.7) regime='Burning plasma';\n    if(p.q>=1) regime='Ignizione';\n\n    const C=942.48;\n    const arcOffset = C*(1 - Math.min(1, p.progress/100));\n    const heat = Math.max(0, Math.min(1, p.q)) * glow;\n    const coreSize = 44 + Math.min(120, S.temp*0.5) + Math.min(46, S.dens*0.4);\n    const aura = Math.min(0.95, (0.22 + 0.55*Math.min(1,(p.reaction/100)*0.5 + p.q*0.7)) * glow);\n\n    const pctOf=(v,min,max)=>Math.max(0,Math.min(100,((v-min)/(max-min))*100));\n    const mk=(id,name,sub,min,max,warm)=>({\n      id, name, sub, min, max, val:S[id], pct:pctOf(S[id],min,max), warm:!!warm,\n      fill: warm ? '#ffb347' : accent,\n      onInput:(e)=>this.setP(id, e.target.value)\n    });\n    const sliders=[\n      mk('temp','Temperatura plasma','milioni di \\u00b0C',1,250,false),\n      mk('dens','Densit\\u00e0 ionica','scala 1\\u2013100',1,100,false),\n      mk('tau','Tempo di confinamento','scala 1\\u2013100',1,100,false),\n      mk('bfield','Campo magnetico','migliora il confinamento',0,100,false),\n      mk('loss','Perdite / instabilit\\u00e0','energia dispersa',0,90,true),\n    ];\n\n    const fuels=[\n      { id:'DT', label:'D\\u2013T', sub:'deuterio + trizio' },\n      { id:'DD', label:'D\\u2013D', sub:'solo deuterio' },\n    ].map(f=>({ id:f.id, label:f.label, sub:f.sub, active:S.fuel===f.id,\n      bg:S.fuel===f.id?accent:'transparent', fg:S.fuel===f.id?'#06121f':'#c2d4e6',\n      onTap:()=>this.setFuel(f.id) }));\n\n    const metrics=[\n      { k:'Indice Lawson', v:this.fmt(p.lawson,2), u:'' },\n      { k:'Q stimato', v:this.fmt(p.q,2), u:'' },\n      { k:'Reazione', v:this.fmt(p.reaction,1), u:'%' },\n      { k:'Prodotto triplo', v:this.fmt(p.triple,1), u:'' },\n    ];\n\n    const presets=[\n      { label:'Avalanche 11M', sub:'punto di partenza', set:{temp:11,dens:12,tau:8,loss:55,bfield:20,fuel:'DT'} },\n      { label:'Plasma migliore', sub:'pi\\u00f9 caldo e denso', set:{temp:60,dens:42,tau:30,loss:38,bfield:45,fuel:'DT'} },\n      { label:'Quasi break-even', sub:'campo magnetico alto', set:{temp:130,dens:72,tau:60,loss:20,bfield:70,fuel:'DT'} },\n      { label:'Scenario ideale', sub:'tutto ottimizzato', set:{temp:210,dens:95,tau:88,loss:8,bfield:90,fuel:'DT'} },\n    ].map(x=>({ label:x.label, sub:x.sub, onTap:()=>this.preset(x.set) }));\n\n    // grafico Q in funzione della temperatura (altri parametri fissi)\n    const maxT=250, N=46; const pts=[]; let qmax=0;\n    for(let i=0;i<=N;i++){ const t=1+(maxT-1)*i/N; const qq=this.qAtTemp(S,t); pts.push([t,qq]); if(qq>qmax)qmax=qq; }\n    const qCap=Math.max(qmax,1.08);\n    const X=(t)=>8+(t/maxT)*284;\n    const Y=(q)=>116-(Math.min(q,qCap)/qCap)*108;\n    const chartCurve=pts.map((d,i)=>(i?'L':'M')+X(d[0]).toFixed(1)+' '+Y(d[1]).toFixed(1)).join(' ');\n    const chartArea='M'+X(0).toFixed(1)+' 116 '+pts.map(d=>'L'+X(d[0]).toFixed(1)+' '+Y(d[1]).toFixed(1)).join(' ')+' L292 116 Z';\n\n    // andamento di Q nel tempo (sparkline)\n    const hist = S.history.length ? S.history : [p.q];\n    const hMax = Math.max(1.1, Math.max.apply(null, hist));\n    const sx=(i)=> hist.length>1 ? (i/(hist.length-1))*276+2 : 2;\n    const sy=(q)=> 36 - (Math.min(q,hMax)/hMax)*32;\n    const sparkPath = hist.map((q,i)=>(i?'L':'M')+sx(i).toFixed(1)+' '+sy(q).toFixed(1)).join(' ');\n    const sparkBE = sy(1).toFixed(1);\n    const prevQ = hist.length>4 ? hist[hist.length-5] : hist[0];\n    const dT = p.q - prevQ;\n    const trendSym = dT>0.02 ? '\\u2197' : (dT<-0.02 ? '\\u2198' : '\\u2192');\n    const trendCol = dT>0.02 ? '#8cff9b' : (dT<-0.02 ? '#ff8aa6' : '#7f95ad');\n\n    const tabs=[\n      { id:'sim', label:'Simulatore' },\n      { id:'manual', label:'Manuale' },\n      { id:'abc', label:'ABC' },\n    ].map(t=>({ id:t.id, label:t.label, active:S.tab===t.id,\n      bg:S.tab===t.id?'rgba(120,232,255,.16)':'transparent',\n      fg:S.tab===t.id?'#bff4ff':'#7f95ad',\n      onTap:()=>this.go(t.id) }));\n\n    const buildSteps=[\n      { n:'01', t:'Cervello', d:'Un microcontrollore (Arduino Nano o Raspberry Pi Pico) alimentato via USB a 5\\u00a0V. Nessuna alta tensione.' },\n      { n:'02', t:'Comandi', d:'Cinque potenziometri a slitta, uno per parametro, collegati agli ingressi analogici.' },\n      { n:'03', t:'Display', d:'Uno schermo OLED o LCD I2C che mostra Lawson, Q e la percentuale di break-even.' },\n      { n:'04', t:'Plasma', d:'Un anello di LED RGB indirizzabili (tipo WS2812): colore e luminosit\\u00e0 guidati dal \\u201ccalore\\u201d, dal blu al bianco.' },\n      { n:'05', t:'Scocca', d:'Un contenitore in cartone, legno o stampato in 3D, con un oblo trasparente sul LED-plasma e le etichette dei comandi.' },\n      { n:'06', t:'Codice', d:'Porta le stesse formule del simulatore sul microcontrollore: leggi i comandi, calcola Q, aggiorna schermo e LED.' },\n    ];\n\n    const bom=[\n      { q:'1', t:'Microcontrollore', s:'Arduino Nano o Raspberry Pi Pico' },\n      { q:'5', t:'Potenziometri a slitta', s:'lineari, 10 k\\u03a9' },\n      { q:'1', t:'Display I2C', s:'OLED 0,96\\u2033 o LCD 16\\u00d72' },\n      { q:'1', t:'Anello LED RGB', s:'WS2812, 12\\u201316 LED' },\n      { q:'1', t:'Cavo USB', s:'alimentazione 5\\u00a0V' },\n      { q:'1', t:'Contenitore', s:'stampa 3D, legno o cartone' },\n      { q:'q.b.', t:'Cavetti e breadboard', s:'per i collegamenti' },\n    ];\n\n    return {\n      accent, tone, status, regime, challenge,\n      arcOffset, heat, coreSize, aura,\n      progressTxt: this.fmt(p.progress,0)+'%',\n      sliders, fuels, metrics, presets, bom,\n      chartCurve, chartArea, curX:X(S.temp).toFixed(1), curY:Y(p.q).toFixed(1), beY:Y(1).toFixed(1),\n      sparkPath, sparkBE, qNow:this.fmt(p.q,2), trendSym, trendCol,\n      tabs, isSim:S.tab==='sim', isManual:S.tab==='manual', isAbc:S.tab==='abc', buildSteps,\n      infoOpen:S.infoOpen,\n      openInfo:()=>this.setState({ infoOpen:true }),\n      closeInfo:()=>this.setState({ infoOpen:false }),\n      showIgnition: p.q>=1 && !S.ackIgnition,\n      ackIgnition:()=>this.setState({ ackIgnition:true }),\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"},"entry":"app_bundle_src"}
